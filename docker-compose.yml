version: '3.8'

services:

  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "5000:5000"
    networks:
      - my-network

  frontend:
    build: .
    container_name: sp-container
    ports:
      - "9092:80"
    depends_on:
      - backend
    networks:
      - my-network

networks:
  my-network: